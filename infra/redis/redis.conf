# Redis configuration for Buscador OSINT
# Ref: Issue #25 — production-grade persistence for Celery task queues

# --- Persistence: AOF (primary) ---
appendonly yes
# Fsync once per second — at most 1s of data loss on crash.
# Combined with Celery acks_late=True, lost tasks are redelivered.
appendfsync everysec
# Rewrite AOF when it doubles in size (minimum 64MB)
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
# Continue fsync during AOF rewrite for stronger durability
no-appendfsync-on-rewrite no
# Use RDB preamble in AOF for faster loads (Redis 4.0+)
aof-use-rdb-preamble yes

# --- Persistence: RDB (supplementary snapshots) ---
save 60 1000

# --- Memory ---
maxmemory 512mb
maxmemory-policy allkeys-lru

# --- Networking ---
bind 0.0.0.0
protected-mode no

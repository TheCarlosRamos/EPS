name: CI Quality & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: uv pip install --system "ruff>=0.8.0"

      - name: Ruff lint check
        run: ruff check . --config documentation/secops/pyproject.toml

      - name: Ruff format check
        run: ruff format --check . --config documentation/secops/pyproject.toml

  static-security:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: uv pip install --system "bandit>=1.8.0"

      - name: Run Bandit security scan
        run: |
          TARGETS=""
          for dir in src backend/src workers rag_module/src documentation/secops/src; do
            if [ -d "$dir" ]; then
              TARGETS="$TARGETS $dir"
            fi
          done
          if [ -z "$TARGETS" ]; then
            echo "No source directories found, scanning documentation/secops/src"
            TARGETS="documentation/secops/src"
          fi
          bandit -r $TARGETS --severity-level medium --confidence-level medium -f json -o bandit-report.json || true
          bandit -r $TARGETS --severity-level medium --confidence-level medium

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  dependency-audit:
    name: Safety Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Safety
        run: uv pip install --system "safety>=3.0.0"

      - name: Run Safety dependency scan
        run: |
          cd documentation/secops
          safety scan || echo "Safety scan completed with findings (non-blocking for initial setup)"
        continue-on-error: true

  test-coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          uv pip install --system -e ".[dev]"

      - name: Run Backend tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python -m pytest --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing -v

      - name: Run RAG Module tests
        env:
          REDIS_URL: redis://localhost:6379/0
          # Adicione outras variáveis de ambiente se o RAG precisar (ex: QDRANT_URL, NEO4J_URL)
        run: |
          cd rag_module
          uv pip install --system .
          python -m pytest tests/ -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 30
